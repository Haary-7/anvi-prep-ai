version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anvi-postgres
    environment:
      POSTGRES_USER: anvi_user
      POSTGRES_PASSWORD: anvi_password_dev
      POSTGRES_DB: anvi_prep_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anvi_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anvi-network

  redis:
    image: redis:7-alpine
    container_name: anvi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anvi-network

  ollama:
    image: ollama/ollama:latest
    container_name: anvi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    networks:
      - anvi-network

  backend:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.backend
    container_name: anvi-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://anvi_user:anvi_password_dev@postgres:5432/anvi_prep_ai
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai:8001
      OLLAMA_BASE_URL: http://ollama:11434
      SECRET_KEY: your-secret-key-change-in-production-min-32-chars
      ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      LOG_LEVEL: INFO
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./apps/api/app:/app/app
    networks:
      - anvi-network

  ai:
    build:
      context: ./services/ai_engine
      dockerfile: ../../infrastructure/docker/Dockerfile.ai
    container_name: anvi-ai
    ports:
      - "8001:8001"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: llama3:8b
      LOG_LEVEL: INFO
      API_KEY_REQUIRED: "false"
    depends_on:
      - ollama
    volumes:
      - ./services/ai_engine/app:/app/app
      - chroma_data:/app/chroma_data
    networks:
      - anvi-network

  frontend:
    build:
      context: ./apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.frontend
    container_name: anvi-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_AI_API_URL: http://localhost:8001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ENV: development
    depends_on:
      - backend
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    networks:
      - anvi-network

  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: ../docker/Dockerfile.nginx
    container_name: anvi-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - anvi-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  chroma_data:

networks:
  anvi-network:
    driver: bridge
